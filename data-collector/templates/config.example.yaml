# data-collector 스킬 설정 파일 예시
# 이 파일을 config.yaml로 복사하여 사용하세요.

# ── 보고서 설정 ──
output_dir: "./output"              # 보고서 저장 경로
report_language: "ko"               # ko / en
report_depth: "deep"                # deep (심층분석) / brief (간단요약)

# ── API 키 (선택사항) ──
# 키가 없는 소스는 자동으로 제외되고, 무료 소스만으로 동작합니다.
# 아래 URL에서 각 API 키를 발급받을 수 있습니다.
api_keys:
  newsapi: "your_newsapi_key_here"              # https://newsapi.org
  data_go_kr: "your_data_go_kr_key_here"        # https://www.data.go.kr
  fred: "your_fred_api_key_here"                # https://fred.stlouisfed.org/docs/api/api_key.html
  youtube_data: "your_youtube_api_key_here"     # Google Cloud Console > YouTube Data API v3
  steam: "your_steam_api_key_here"              # https://steamcommunity.com/dev/apikey

# ── MCP 연동 (선택사항, 모드2 자동화용) ──
integrations:
  slack_webhook: "https://hooks.slack.com/services/xxx/yyy/zzz"

# ── 기본 분야 설정 (선택사항) ──
# 설정하면 매번 분야를 묻지 않고 해당 분야로 바로 실행
default_domain: "tech"              # finance / beauty / tech / food / realestate / game
